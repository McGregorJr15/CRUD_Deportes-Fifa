<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Agregar Jugador</title></head>
<body style="font-family: Arial, sans-serif; padding: 20px;">
    <h2>Jugadores - Agregar</h2>
    <p><a th:href="@{/jugadores}">Regresar</a></p>
    <form th:action="@{/jugadores/guardar}" th:object="${jugador}" method="post">
        <p>Nombre:<br><input type="text" th:field="*{nombre}" required style="padding: 5px; width: 250px;"/></p>
        <p>Posición:<br><input type="text" th:field="*{posicion}" required style="padding: 5px; width: 250px;"/></p>
        <p>Número:<br><input type="number" th:field="*{dorsal}" required style="padding: 5px; width: 250px;"/></p>
        <button type="submit" style="padding: 5px 20px;">Guardar</button>
    </form>
</body>
</html>
